<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uno - Lobby</title>
  </head>
  <body>
    <header>
      <img src="/public/images/logo.png" alt="Uno" />
      <span id="current-username"></span>
    </header>
    <main>
      <h1>Lobby</h1>
      <section id="create-room">
        <form id="create-room-form">
          <input type="text" id="room-name" name="room-name" placeholder="Nom de la room" maxlength="30" required />
          <button type="submit">Créer une room</button>
        </form>
      </section>
      <hr />
      <section id="room-list">
        <h2>Liste des rooms</h2>
        <ul id="rooms"></ul>
      </section>
    </main>
    <script src="/public/js/lobby.js"></script>
  </body>
</html>
