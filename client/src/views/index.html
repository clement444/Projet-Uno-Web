<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uno - Connexion</title>
  </head>
  <body>
    <main>
      <img src="/public/images/logo.png" alt="Uno" />
      <div id="auth-tabs">
        <button type="button" id="tab-login" class="tab active">Connexion</button>
        <button type="button" id="tab-register" class="tab">Créer un compte</button>
      </div>
      <form id="login-form">
        <input type="text" id="login-username" name="username" placeholder="Ton pseudo" maxlength="20" required />
        <input type="password" id="login-password" name="password" placeholder="Mot de passe" required />
        <button type="submit">Se connecter</button>
      </form>
      <form id="register-form" hidden>
        <input type="text" id="register-username" name="username" placeholder="Ton pseudo" maxlength="20" required />
        <input type="password" id="register-password" name="password" placeholder="Mot de passe" required />
        <input type="password" id="register-confirm" name="confirm" placeholder="Confirmer le mot de passe" required />
        <button type="submit">Créer le compte</button>
      </form>
    </main>
    <script src="/public/js/index.js"></script>
  </body>
</html>
