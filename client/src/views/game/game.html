<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uno - Partie</title>
  </head>
  <body>
    <header style="text-align: center">
      <a href="/"><img src="/public/images/logo.png" alt="Uno" width="250" /></a>
      <span id="room-name"></span>
      <span id="current-player-name"></span>
    </header>
    <main>
      <section id="opponents">
        <ul id="opponent-list"></ul>
      </section>
      <section id="board">
        <div id="draw-pile">
          <button id="draw-btn">Piocher</button>
        </div>
        <div id="discard-pile">
          <div id="current-card"></div>
        </div>
      </section>
      <section id="hand">
        <ul id="player-cards"></ul>
      </section>
      <section id="turn-section">
        <p id="turn-indicator"></p>
      </section>
      <section id="uno-actions">
        <button id="uno-btn" disabled>UNO !</button>
        <button id="counter-uno-btn" disabled>Contre UNO</button>
      </section>
    </main>
    <script src="/public/js/game.js"></script>
  </body>
</html>
