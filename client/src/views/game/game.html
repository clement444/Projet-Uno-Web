<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uno - Partie</title>
    <link rel="stylesheet" href="/public/css/game/game.css" />
  </head>
  <body>
    <div id="notification"></div>
    <header>
      <a href="/"><img src="/public/images/logo.png" alt="Uno" /></a>
      <div id="game-info">
        <span id="room-name"></span>
        <span id="current-player-name"></span>
        <span id="direction-indicator"></span>
      </div>
    </header>
    <main>
      <section id="opponents">
        <ul id="opponent-list"></ul>
      </section>
      <section id="board">
        <div id="draw-pile">
          <p class="pile-label">Pioche</p>
          <button id="draw-btn" disabled>
            <img src="/public/assets/cards/uno_recto.svg" alt="Pioche" />
          </button>
        </div>
        <div id="discard-pile">
          <p class="pile-label">Défausse</p>
          <div id="current-card"></div>
        </div>
      </section>
      <section id="hand">
        <ul id="player-cards"></ul>
      </section>
      <section id="controls">
        <p id="turn-indicator"></p>
        <div id="action-btns">
          <button id="uno-btn" hidden disabled>UNO !</button>
          <button id="counter-uno-btn" hidden disabled>Contre UNO</button>
          <button id="jouer-btn" disabled>JOUER</button>
          <button id="leave-btn">Quitter</button>
        </div>
      </section>
    </main>
    <div id="color-picker" hidden>
      <p>Choisis une couleur</p>
      <div id="color-picker-btns">
        <button data-color="1" style="background:#F63A3A" aria-label="Rouge"></button>
        <button data-color="2" style="background:#565EF5" aria-label="Bleu"></button>
        <button data-color="3" style="background:#5DF55D" aria-label="Vert"></button>
        <button data-color="4" style="background:#F5D55D" aria-label="Jaune"></button>
      </div>
    </div>
    <script src="/public/js/game.js"></script>
  </body>
</html>
