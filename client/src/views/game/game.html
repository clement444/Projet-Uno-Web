<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uno - Partie</title>
    <link rel="stylesheet" href="/public/css/game/game.css" />
    <style>
      .card-playable {
        outline: 2px solid rgba(255, 255, 255, 0.85);
        outline-offset: 3px;
        box-shadow: 0 0 14px rgba(255, 255, 255, 0.3);
      }

      #color-picker {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        background: rgba(0, 0, 0, 0.78);
        z-index: 100;
      }
      #color-picker p {
        color: white;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.3px;
      }
      #color-picker-btns {
        display: flex;
        gap: 20px;
      }
      #color-picker-btns button {
        width: 88px;
        height: 88px;
        border-radius: 14px;
        border: 3px solid rgba(255, 255, 255, 0.25);
        cursor: pointer;
        font-size: 13px;
        font-weight: 700;
        color: rgba(0, 0, 0, 0.65);
        font-family: inherit;
        transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      }
      #color-picker-btns button:hover {
        transform: scale(1.12);
        border-color: white;
        box-shadow: 0 0 16px rgba(255, 255, 255, 0.35);
      }
    </style>
  </head>
  <body>
    <div id="notification"></div>
    <header>
      <a href="/"><img src="/public/images/logo.png" alt="Uno" /></a>
      <div id="game-info">
        <span id="room-name"></span>
        <span id="current-player-name"></span>
        <span id="direction-indicator"></span>
      </div>
    </header>
    <main>
      <section id="opponents">
        <ul id="opponent-list"></ul>
      </section>
      <section id="board">
        <div id="draw-pile">
          <p class="pile-label">Pioche</p>
          <button id="draw-btn" disabled>
            <img src="/public/assets/cards/uno_recto.svg" alt="Pioche" />
          </button>
        </div>
        <div id="discard-pile">
          <p class="pile-label">Défausse</p>
          <div id="current-card"></div>
        </div>
      </section>
      <section id="hand">
        <ul id="player-cards"></ul>
      </section>
      <section id="controls">
        <p id="turn-indicator"></p>
        <div id="action-btns">
          <button id="uno-btn" hidden disabled>UNO !</button>
          <button id="counter-uno-btn" hidden disabled>Contre UNO</button>
          <button id="jouer-btn" disabled>JOUER</button>
          <button id="leave-btn">Quitter</button>
        </div>
      </section>
    </main>
    <div id="color-picker" hidden>
      <p>Choisis une couleur</p>
      <div id="color-picker-btns">
        <button data-color="1" style="background:#F63A3A" aria-label="Rouge">Rouge</button>
        <button data-color="2" style="background:#565EF5" aria-label="Bleu">Bleu</button>
        <button data-color="3" style="background:#5DF55D" aria-label="Vert">Vert</button>
        <button data-color="4" style="background:#F5D55D" aria-label="Jaune">Jaune</button>
      </div>
    </div>
    <script src="/public/js/game.js"></script>
  </body>
</html>
